name: DevGuard CD - Deploy to Production

on:
  workflow_run:
    workflows:
      - DevGuard CI - Zero-Trust Pipeline
    branches:
      - main
    types:
      - completed

  workflow_dispatch:
    inputs:
      image_tag:
        description: Docker image tag to deploy
        required: false
        default: latest
      environment:
        description: Target environment
        required: true
        default: production
        type: choice
        options:
          - production
          - staging
      force:
        description: Force deploy
        required: false
        type: boolean
        default: false

env:
  REGISTRY: ghcr.io
  DEPLOY_TAG: ${{ github.event.inputs.image_tag || 'latest' }}
  TARGET_ENV: ${{ github.event.inputs.environment || 'production' }}

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  pre-check:
    name: Pre-Deploy Checks
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'

    outputs:
      proceed: ${{ steps.check.outputs.proceed }}
      image: ${{ steps.check.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify deployment prerequisites
        id: check
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="${{ env.REGISTRY }}/$REPO:${{ env.DEPLOY_TAG }}"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.force }}" = "true" ]; then
            echo "::warning::Force deploy requested."
          fi

          echo "proceed=true" >> "$GITHUB_OUTPUT"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Write pre-check summary
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          {
            echo "## Pre-Deployment Checks"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| CI Pipeline | Passed |"
            echo "| Target Image | \`ghcr.io/$REPO:${{ env.DEPLOY_TAG }}\` |"
            echo "| Environment | \`${{ env.TARGET_ENV }}\` |"
            echo "| Triggered By | ${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: pre-check
    if: needs.pre-check.outputs.proceed == 'true'

    environment:
      name: ${{ github.event.inputs.environment || 'production' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull image
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/$REPO:${{ env.DEPLOY_TAG }}"
          echo "Pulling $IMAGE"
          docker pull "$IMAGE"

      - name: Verify image signature
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/$REPO:${{ env.DEPLOY_TAG }}"

          echo "Verifying signature for $IMAGE"
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "$IMAGE"

      - name: Deploy with Docker Compose
        run: |
          echo "Deploying DevGuard API"
          echo "Image: ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):${{ env.DEPLOY_TAG }}"
          echo "Environment: ${{ env.TARGET_ENV }}"
          echo "Commit: ${{ github.sha }}"
          echo ""
          echo "For a real server deployment, replace this step with SSH-based docker compose commands."
          echo "Example:"
          echo "  docker compose pull api"
          echo "  docker compose up -d --no-deps api"

      - name: Write deploy summary
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          {
            echo "## Deployment"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Image | \`ghcr.io/$REPO:${{ env.DEPLOY_TAG }}\` |"
            echo "| Environment | \`${{ env.TARGET_ENV }}\` |"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Signature | Verified (Cosign) |"
            echo "| Deployed by | ${{ github.actor }} |"
          } >> "$GITHUB_STEP_SUMMARY"

  verify:
    name: Verify
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Health check
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 10 http://localhost:5000/api/v1/health || echo "000")

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "HEALTH_RESULT=Passed (HTTP 200)" >> "$GITHUB_ENV"
          else
            echo "HEALTH_RESULT=Skipped or no live server configured" >> "$GITHUB_ENV"
          fi

      - name: Post deployment record to DevGuard API
        env:
          DEVGUARD_API_URL: ${{ secrets.DEVGUARD_API_URL }}
          DEVGUARD_USERNAME: ${{ secrets.DEVGUARD_USERNAME }}
          DEVGUARD_PASSWORD: ${{ secrets.DEVGUARD_PASSWORD }}
        run: |
          if [ -z "$DEVGUARD_API_URL" ] || [ -z "$DEVGUARD_USERNAME" ] || [ -z "$DEVGUARD_PASSWORD" ]; then
            echo "API_RECORD_RESULT=Skipped (missing DevGuard API secrets)" >> "$GITHUB_ENV"
            exit 0
          fi

          TOKEN=$(curl -s -X POST "$DEVGUARD_API_URL/api/v1/auth/login" \
            -H "Content-Type: application/json" \
            -d "{\"username\":\"$DEVGUARD_USERNAME\",\"password\":\"$DEVGUARD_PASSWORD\"}" \
            | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('data', {}).get('access_token', ''))" 2>/dev/null)

          if [ -z "$TOKEN" ]; then
            echo "API_RECORD_RESULT=Skipped (authentication failed)" >> "$GITHUB_ENV"
            exit 0
          fi

          PIPELINE_ID=$(curl -s -X POST "$DEVGUARD_API_URL/api/v1/pipelines" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"commit_id\": \"${{ github.sha }}\",
              \"branch\": \"${{ github.ref_name }}\",
              \"status\": \"passed\",
              \"triggered_by\": \"github-actions\"
            }" \
            | python3 -c "import sys, json; d=json.load(sys.stdin); print(d.get('data', {}).get('id', ''))" 2>/dev/null)

          if [ -z "$PIPELINE_ID" ]; then
            echo "API_RECORD_RESULT=Skipped (pipeline record creation failed)" >> "$GITHUB_ENV"
            exit 0
          fi

          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          curl -s -X POST "$DEVGUARD_API_URL/api/v1/deployments" \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{
              \"pipeline_id\": \"$PIPELINE_ID\",
              \"image_tag\": \"ghcr.io/$REPO:${{ env.DEPLOY_TAG }}\",
              \"signed\": true,
              \"environment\": \"${{ env.TARGET_ENV }}\",
              \"status\": \"deployed\"
            }" >/dev/null

          echo "API_RECORD_RESULT=Posted to DevGuard API" >> "$GITHUB_ENV"

      - name: Write verify summary
        run: |
          {
            echo "## Post-Deploy Verification"
            echo ""
            echo "| Check | Result |"
            echo "|-------|--------|"
            echo "| Health endpoint | ${HEALTH_RESULT:-Unknown} |"
            echo "| API record | ${API_RECORD_RESULT:-Unknown} |"
            echo "| Image signed | Verified (Cosign) |"
          } >> "$GITHUB_STEP_SUMMARY"

  notify:
    name: Summary
    runs-on: ubuntu-latest
    needs:
      - pre-check
      - deploy
      - verify
    if: always()

    steps:
      - name: Write deployment summary
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          PRE="${{ needs.pre-check.result }}"
          DEP="${{ needs.deploy.result }}"
          VER="${{ needs.verify.result }}"

          status_icon() {
            case "$1" in
              success) echo "Passed" ;;
              failure) echo "Failed" ;;
              skipped) echo "Skipped" ;;
              *) echo "$1" ;;
            esac
          }

          OVERALL="DEPLOYMENT SUCCESSFUL"
          if [ "$DEP" != "success" ]; then
            OVERALL="DEPLOYMENT FAILED"
          fi

          {
            echo "# DevGuard Deployment Report"
            echo ""
            echo "## $OVERALL"
            echo ""
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Commit | \`${{ github.sha }}\` |"
            echo "| Branch | \`${{ github.ref_name }}\` |"
            echo "| Environment | \`${{ env.TARGET_ENV }}\` |"
            echo "| Image | \`ghcr.io/$REPO:${{ env.DEPLOY_TAG }}\` |"
            echo "| Actor | ${{ github.actor }} |"
            echo "| Trigger | ${{ github.event_name }} |"
            echo ""
            echo "## Pipeline Jobs"
            echo ""
            echo "| Job | Status |"
            echo "|-----|--------|"
            echo "| Pre-Deploy Checks | $(status_icon "$PRE") |"
            echo "| Deploy | $(status_icon "$DEP") |"
            echo "| Verify | $(status_icon "$VER") |"
          } >> "$GITHUB_STEP_SUMMARY"

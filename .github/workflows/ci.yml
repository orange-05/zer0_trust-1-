name: DevGuard CI - Zero-Trust Pipeline

on:
  push:
  pull_request:
    branches:
      - main

env:
  IMAGE_NAME: devguard-api
  IMAGE_TAG: ${{ github.sha }}
  PYTHON_VER: "3.11"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── JOB 1 · LINT ──────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: pip

      - name: Install flake8
        run: |
          python -m pip install --upgrade pip
          pip install flake8==7.1.1

      - name: Run flake8
        run: |
          flake8 app/ \
            --max-line-length=120 \
            --exclude=__pycache__,data,reports \
            --format="::error file=%(path)s,line=%(row)d,col=%(col)d::%(text)s" \
            --statistics

      - name: Write summary
        if: always()
        run: |
          {
            echo "## Lint (flake8)"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Tool | flake8 7.1.1 |"
            echo "| Max line length | 120 |"
            echo "| Target | \`app/\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── JOB 2 · TEST ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Create test data directory
        run: mkdir -p data_test

      - name: Run pytest with coverage
        env:
          FLASK_ENV: testing
        run: |
          pytest \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --tb=short \
            -v

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      - name: Write summary
        if: always()
        run: |
          COV=$(python3 - <<'PY'
          import xml.etree.ElementTree as ET
          try:
              root = ET.parse('coverage.xml').getroot()
              print(f'{float(root.get("line-rate", 0)) * 100:.1f}%')
          except Exception:
              print('N/A')
          PY
          )
          {
            echo "## Tests (pytest)"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Coverage | $COV |"
            echo "| Artifact | \`coverage-report\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── JOB 3 · DEPENDENCY SCAN ───────────────────────────────────
  # Zero-trust gate: blocks pipeline on CRITICAL CVEs
  scan-deps:
    name: Dependency Scan
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create reports directory
        run: mkdir -p reports

      - name: Trivy JSON scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: json
          output: reports/trivy-deps.json
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"
          ignore-unfixed: true

      - name: Trivy table scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Parse and gate
        id: gate
        run: |
          python3 - <<'PY'
          import json
          import os

          critical = 0
          high = 0

          try:
              with open("reports/trivy-deps.json", "r", encoding="utf-8") as f:
                  data = json.load(f)
              for r in data.get("Results", []):
                  for v in r.get("Vulnerabilities") or []:
                      if v.get("Severity") == "CRITICAL":
                          critical += 1
                      elif v.get("Severity") == "HIGH":
                          high += 1
          except Exception as e:
              print(f"Parse warning: {e}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"critical={critical}\n")
              f.write(f"high={high}\n")

          status = "PASSED" if critical == 0 else "BLOCKED"
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as f:
              f.write("## Dependency Scan (Trivy)\n\n")
              f.write("| Severity | Count |\n")
              f.write("|----------|-------|\n")
              f.write(f"| Critical | {critical} |\n")
              f.write(f"| High     | {high} |\n\n")
              f.write(f"**Gate: {status}**\n")
          PY

      - name: Upload dependency scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-deps-report
          path: reports/trivy-deps.json
          retention-days: 14

      - name: Block on critical dependency CVEs
        if: steps.gate.outputs.critical != '0'
        run: |
          echo "::error::Zero-trust gate blocked: ${{ steps.gate.outputs.critical }} critical dependency vulnerabilities found."
          exit 1

  # ── JOB 4 · DOCKER BUILD ──────────────────────────────────────
  build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: scan-deps

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/devguard-image.tar

      - name: Upload image tar
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/devguard-image.tar
          retention-days: 1

      - name: Write summary
        run: |
          {
            echo "## Docker Build"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Image | \`${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── JOB 5 · IMAGE SCAN (parallel with sbom) ───────────────────
  # Zero-trust gate: blocks signing on CRITICAL CVEs
  scan-image:
    name: Image Scan
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/devguard-image.tar

      - name: Create reports directory
        run: mkdir -p reports

      - name: Trivy image JSON scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: json
          output: reports/trivy-image.json
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "0"
          ignore-unfixed: true

      - name: Trivy image table scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: image
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"
          ignore-unfixed: true

      - name: Parse and gate image scan
        id: img_gate
        run: |
          python3 - <<'PY'
          import json
          import os

          critical = 0
          high = 0

          try:
              with open("reports/trivy-image.json", "r", encoding="utf-8") as f:
                  data = json.load(f)
              for r in data.get("Results", []):
                  for v in r.get("Vulnerabilities") or []:
                      if v.get("Severity") == "CRITICAL":
                          critical += 1
                      elif v.get("Severity") == "HIGH":
                          high += 1
          except Exception as e:
              print(f"Parse warning: {e}")

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as f:
              f.write(f"critical={critical}\n")
              f.write(f"high={high}\n")

          status = "PASSED" if critical == 0 else "BLOCKED"
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as f:
              f.write("## Image Scan (Trivy)\n\n")
              f.write("| Severity | Count |\n")
              f.write("|----------|-------|\n")
              f.write(f"| Critical | {critical} |\n")
              f.write(f"| High     | {high} |\n\n")
              f.write(f"**Gate: {status}**\n")
          PY

      - name: Upload image scan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: reports/trivy-image.json
          retention-days: 14

      - name: Block on critical image CVEs
        if: steps.img_gate.outputs.critical != '0'
        run: |
          echo "::error::Zero-trust gate blocked: ${{ steps.img_gate.outputs.critical }} critical image vulnerabilities found."
          exit 1

  # ── JOB 6 · SBOM (parallel with scan-image) ───────────────────
  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/devguard-image.tar

      - name: Create reports directory
        run: mkdir -p reports

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" \
            -o spdx-json=reports/sbom.spdx.json

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: reports/sbom.spdx.json
          retention-days: 90

      - name: Write summary
        run: |
          PKG=$(python3 - <<'PY'
          import json
          try:
              with open('reports/sbom.spdx.json', 'r', encoding='utf-8') as f:
                  d = json.load(f)
              print(len(d.get('packages', [])))
          except Exception:
              print('unknown')
          PY
          )
          {
            echo "## SBOM (Syft)"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Format | SPDX JSON |"
            echo "| Packages | $PKG |"
            echo "| Artifact | \`sbom-report\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── JOB 7 · SIGN (main only) ──────────────────────────────────
  sign:
    name: Sign Image
    runs-on: ubuntu-latest
    needs:
      - scan-image
      - sbom
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write
      id-token: write # required for Sigstore OIDC keyless signing

    steps:
      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: v2.2.4

      - name: Download image tar
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/devguard-image.tar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push to GHCR
        id: push_image
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHA_TAG="ghcr.io/$REPO:${{ env.IMAGE_TAG }}"
          LATEST="ghcr.io/$REPO:latest"
          docker tag "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" "$SHA_TAG"
          docker tag "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}" "$LATEST"
          docker push "$SHA_TAG"
          docker push "$LATEST"
          echo "sha_tag=$SHA_TAG" >> "$GITHUB_OUTPUT"

      - name: Sign with Cosign
        run: cosign sign --yes "${{ steps.push_image.outputs.sha_tag }}"

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/heads/main" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
            "${{ steps.push_image.outputs.sha_tag }}"

      - name: Write summary
        run: |
          {
            echo "## Image Signing (Cosign)"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Signed | \`${{ steps.push_image.outputs.sha_tag }}\` |"
            echo "| Method | Cosign keyless (Sigstore) |"
          } >> "$GITHUB_STEP_SUMMARY"

  # ── JOB 8 · SUMMARY (always runs) ────────────────────────────
  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs:
      - scan-deps
      - scan-image
      - sbom
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true

      - name: Generate summary report
        run: |
          python3 - <<'PY'
          import json
          import os

          def count(path, severity):
              try:
                  with open(path, "r", encoding="utf-8") as f:
                      data = json.load(f)
                  total = 0
                  for r in data.get("Results", []):
                      for v in r.get("Vulnerabilities") or []:
                          if v.get("Severity") == severity:
                              total += 1
                  return total
              except Exception:
                  return 0

          dc = count("trivy-deps-report/trivy-deps.json", "CRITICAL")
          dh = count("trivy-deps-report/trivy-deps.json", "HIGH")
          ic = count("trivy-image-report/trivy-image.json", "CRITICAL")
          ih = count("trivy-image-report/trivy-image.json", "HIGH")

          tc = dc + ic
          th = dh + ih

          trusted   = tc == 0
          branch    = os.environ.get("GITHUB_REF_NAME", "")
          event     = os.environ.get("GITHUB_EVENT_NAME", "")
          sha       = os.environ.get("GITHUB_SHA", "")[:12]
          repo      = os.environ.get("GITHUB_REPOSITORY", "")
          actor     = os.environ.get("GITHUB_ACTOR", "")
          run_number = os.environ.get("GITHUB_RUN_NUMBER", "")
          run_id    = os.environ.get("GITHUB_RUN_ID", "")
          server    = os.environ.get("GITHUB_SERVER_URL", "https://github.com")

          if branch == "main" and event == "push" and trusted:
              sign_status = "Signed (Cosign keyless)"
          elif branch != "main":
              sign_status = "Skipped (not main branch)"
          else:
              sign_status = "Blocked (critical CVEs present)"

          trust_text = "TRUSTED - Deployment Authorized" if trusted else "UNTRUSTED - Deployment Blocked"

          report = (
              "# DevGuard Zero-Trust Pipeline Report\n\n"
              "| Item | Value |\n"
              "|------|-------|\n"
              f"| Commit | `{sha}` |\n"
              f"| Branch | `{branch}` |\n"
              f"| Author | `{actor}` |\n"
              f"| Event | `{event}` |\n"
              f"| Run | [#{run_number}]({server}/{repo}/actions/runs/{run_id}) |\n\n"
              "## Trust Gate\n\n"
              f"**{trust_text}**\n\n"
              "## Security Results\n\n"
              "| Scan | Critical | High |\n"
              "|------|----------|------|\n"
              f"| Dependency Scan | {dc} | {dh} |\n"
              f"| Image Scan | {ic} | {ih} |\n"
              f"| **Total** | **{tc}** | **{th}** |\n\n"
              "## Pipeline Stages\n\n"
              "| Stage | Status |\n"
              "|-------|--------|\n"
              "| Lint | Passed |\n"
              "| Test | Passed |\n"
              f"| Dependency Scan | {'Passed' if dc == 0 else 'Blocked'} |\n"
              "| Docker Build | Built |\n"
              f"| Image Scan | {'Passed' if ic == 0 else 'Blocked'} |\n"
              "| SBOM | Generated |\n"
              f"| Sign | {sign_status} |\n"
              "| Summary | Done |\n"
          )
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a", encoding="utf-8") as f:
              f.write(report)
          print("Summary written.")
          PY

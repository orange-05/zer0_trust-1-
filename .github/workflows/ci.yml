name: "DevGuard CI — Zero-Trust Pipeline"
# ============================================================
# WHAT YOU SEE IN GITHUB ACTIONS:
#
#   ┌──────┐   ┌──────┐   ┌────────────┐   ┌───────┐
#   │ Lint │──▶│ Test │──▶│  Dep Scan  │──▶│ Build │
#   └──────┘   └──────┘   └────────────┘   └───┬───┘
#                                               │
#                          ┌────────────────────┼──────────┐
#                          ▼                    ▼
#                    ┌──────────┐         ┌──────────┐
#                    │  Image   │         │   SBOM   │  (parallel)
#                    │   Scan   │         │          │
#                    └────┬─────┘         └────┬─────┘
#                         └────────┬───────────┘
#                                  ▼
#                            ┌──────────┐
#                            │   Sign   │  (main only)
#                            └────┬─────┘
#                                 ▼
#                           ┌──────────┐
#                           │ Summary  │  (always)
#                           └──────────┘
# ============================================================

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["main"]

env:
  IMAGE_NAME: devguard-api
  IMAGE_TAG:  ${{ github.sha }}
  PYTHON_VER: "3.11"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ============================================================
  # JOB 1 — LINT
  # ============================================================
  lint:
    name: "🔍 Lint"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: pip

      - name: Install flake8
        run: pip install flake8==7.1.1

      - name: Run flake8
        run: |
          flake8 app/ \
            --max-line-length=120 \
            --exclude=__pycache__,data,reports \
            --format="::error file=%(path)s,line=%(row)d,col=%(col)d::%(text)s" \
            --statistics

      - name: Write summary
        if: always()
        run: |
          echo "## 🔍 Lint (flake8)" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Tool | flake8 7.1.1 |" >> $GITHUB_STEP_SUMMARY
          echo "| Max line length | 120 |" >> $GITHUB_STEP_SUMMARY
          echo "| Target | \`app/\` |" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 2 — TEST
  # ============================================================
  test:
    name: "🧪 Test"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VER }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create test data directory
        run: mkdir -p data_test

      - name: Run pytest with coverage
        env:
          FLASK_ENV: testing
        run: |
          pytest \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --tb=short \
            -v

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

      - name: Write summary
        if: always()
        run: |
          COV=$(python3 -c "
          import xml.etree.ElementTree as ET
          try:
            root = ET.parse('coverage.xml').getroot()
            print(f\"{float(root.get('line-rate',0))*100:.1f}%\")
          except:
            print('N/A')
          " 2>/dev/null || echo "N/A")
          echo "## 🧪 Tests (pytest)" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage | $COV |" >> $GITHUB_STEP_SUMMARY
          echo "| Artifact | \`coverage-report\` |" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 3 — DEPENDENCY SCAN
  # ZERO-TRUST GATE: blocks if CRITICAL CVEs found
  # ============================================================
  scan-deps:
    name: "🛡 Dependency Scan"
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Create reports dir
        run: mkdir -p reports

      - name: Trivy — JSON output
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "json"
          output: "reports/trivy-deps.json"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"
          ignore-unfixed: true

      - name: Trivy — table output
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true

      - name: Parse results and apply gate
        id: gate
        run: |
          python3 - << 'PYEOF'
          import json, os
          try:
            data = json.load(open("reports/trivy-deps.json"))
            results = data.get("Results", [])
            critical = sum(
              len([v for v in (r.get("Vulnerabilities") or []) if v.get("Severity") == "CRITICAL"])
              for r in results
            )
            high = sum(
              len([v for v in (r.get("Vulnerabilities") or []) if v.get("Severity") == "HIGH"])
              for r in results
            )
          except Exception as e:
            print(f"Parse warning: {e}")
            critical, high = 0, 0

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"critical={critical}\n")
            f.write(f"high={high}\n")

          icon = "Pass" if critical == 0 else "BLOCKED"
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
            f.write("## 🛡 Dependency Scan (Trivy)\n")
            f.write("| Severity | Count |\n")
            f.write("|----------|-------|\n")
            f.write(f"| Critical | {critical} |\n")
            f.write(f"| High | {high} |\n\n")
            f.write(f"Gate: {icon}\n")

          print(f"dep scan: critical={critical}, high={high}")
          PYEOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-deps-report
          path: reports/trivy-deps.json
          retention-days: 14

      - name: Block on critical CVEs
        if: steps.gate.outputs.critical != '0'
        run: |
          echo "::error::ZERO-TRUST GATE: ${{ steps.gate.outputs.critical }} CRITICAL CVEs — pipeline stopped"
          exit 1

  # ============================================================
  # JOB 4 — DOCKER BUILD
  # ============================================================
  build:
    name: "🐳 Docker Build"
    runs-on: ubuntu-latest
    needs: scan-deps

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          outputs: type=docker,dest=/tmp/devguard-image.tar

      - name: Upload image tar
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/devguard-image.tar
          retention-days: 1

      - name: Write summary
        run: |
          echo "## 🐳 Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Base | python:3.11-slim (non-root) |" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 5 — IMAGE SCAN (parallel with SBOM)
  # ============================================================
  scan-image:
    name: "🔬 Image Scan"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/devguard-image.tar

      - name: Create reports dir
        run: mkdir -p reports

      - name: Trivy — JSON output
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          format: "json"
          output: "reports/trivy-image.json"
          severity: "CRITICAL,HIGH,MEDIUM"
          exit-code: "0"
          ignore-unfixed: true

      - name: Trivy — table output
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "image"
          image-ref: "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          format: "table"
          severity: "CRITICAL,HIGH"
          exit-code: "0"
          ignore-unfixed: true

      - name: Parse results and apply gate
        id: img-gate
        run: |
          python3 - << 'PYEOF'
          import json, os
          try:
            data = json.load(open("reports/trivy-image.json"))
            results = data.get("Results", [])
            critical = sum(
              len([v for v in (r.get("Vulnerabilities") or []) if v.get("Severity") == "CRITICAL"])
              for r in results
            )
            high = sum(
              len([v for v in (r.get("Vulnerabilities") or []) if v.get("Severity") == "HIGH"])
              for r in results
            )
          except Exception as e:
            print(f"Parse warning: {e}")
            critical, high = 0, 0

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
            f.write(f"critical={critical}\n")
            f.write(f"high={high}\n")

          icon = "Pass" if critical == 0 else "BLOCKED"
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
            f.write("## 🔬 Image Scan (Trivy)\n")
            f.write("| Severity | Count |\n")
            f.write("|----------|-------|\n")
            f.write(f"| Critical | {critical} |\n")
            f.write(f"| High | {high} |\n\n")
            f.write(f"Gate: {icon}\n")

          print(f"image scan: critical={critical}, high={high}")
          PYEOF

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-report
          path: reports/trivy-image.json
          retention-days: 14

      - name: Block on critical CVEs in image
        if: steps.img-gate.outputs.critical != '0'
        run: |
          echo "::error::ZERO-TRUST GATE: ${{ steps.img-gate.outputs.critical }} CRITICAL CVEs in image — signing blocked"
          exit 1

  # ============================================================
  # JOB 6 — SBOM (parallel with image scan)
  # ============================================================
  sbom:
    name: "📋 SBOM"
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Download image
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/devguard-image.tar

      - name: Create reports dir
        run: mkdir -p reports

      - name: Install Syft
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Generate SBOM
        run: |
          syft ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} \
            -o spdx-json=reports/sbom.spdx.json \
            -o table

      - name: Write summary
        run: |
          PKG=$(python3 -c "
          import json
          try:
            d = json.load(open('reports/sbom.spdx.json'))
            print(len([p for p in d.get('packages', []) if p.get('name')]))
          except:
            print('unknown')
          ")
          echo "## 📋 SBOM (Syft)" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Format | SPDX JSON |" >> $GITHUB_STEP_SUMMARY
          echo "| Packages | $PKG |" >> $GITHUB_STEP_SUMMARY

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-report
          path: reports/sbom.spdx.json
          retention-days: 90

  # ============================================================
  # JOB 7 — SIGN (main branch only)
  # ============================================================
  sign:
    name: "✍ Sign Image"
    runs-on: ubuntu-latest
    needs: [scan-image, sbom]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: "v2.2.4"

      - name: Download image tar
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load image
        run: docker load --input /tmp/devguard-image.tar

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Tag and push to GHCR
        id: push
        run: |
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          SHA_TAG="ghcr.io/$REPO:${{ env.IMAGE_TAG }}"
          LATEST="ghcr.io/$REPO:latest"
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} $SHA_TAG
          docker tag ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} $LATEST
          docker push $SHA_TAG
          docker push $LATEST
          echo "sha-tag=$SHA_TAG" >> $GITHUB_OUTPUT

      - name: Sign with Cosign
        run: cosign sign --yes ${{ steps.push.outputs.sha-tag }}

      - name: Verify signature
        run: |
          cosign verify \
            --certificate-identity-regexp="https://github.com/${{ github.repository }}/.github/workflows/ci.yml@refs/heads/main" \
            --certificate-oidc-issuer="https://token.actions.githubusercontent.com" \
            ${{ steps.push.outputs.sha-tag }} \
            2>&1 | head -5

      - name: Write summary
        run: |
          echo "## ✍ Image Signing (Cosign)" >> $GITHUB_STEP_SUMMARY
          echo "| Item | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ steps.push.outputs.sha-tag }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Method | Cosign keyless (Sigstore) |" >> $GITHUB_STEP_SUMMARY

  # ============================================================
  # JOB 8 — SUMMARY (always runs)
  # ============================================================
  summary:
    name: "📊 Summary"
    runs-on: ubuntu-latest
    needs: [scan-deps, scan-image, sbom]
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Download scan artifacts
        uses: actions/download-artifact@v4
        continue-on-error: true

      - name: Generate security report
        run: |
          python3 - << 'PYEOF'
          import json, os

          def count(path, sev):
            try:
              data = json.load(open(path))
              return sum(
                len([v for v in (r.get("Vulnerabilities") or []) if v.get("Severity") == sev])
                for r in data.get("Results", [])
              )
            except Exception:
              return 0

          dc = count("trivy-deps-report/trivy-deps.json", "CRITICAL")
          dh = count("trivy-deps-report/trivy-deps.json", "HIGH")
          ic = count("trivy-image-report/trivy-image.json", "CRITICAL")
          ih = count("trivy-image-report/trivy-image.json", "HIGH")
          tc = dc + ic
          th = dh + ih

          event   = os.environ.get("GITHUB_EVENT_NAME", "")
          is_main = os.environ.get("GITHUB_REF_NAME", "") == "main"
          trusted = tc == 0

          trust  = "TRUSTED - Deployment Authorized" if trusted else "UNTRUSTED - Deployment Blocked"
          detail = (
            "All security gates passed. Image is signed and safe to deploy."
            if trusted else
            f"{tc} critical CVEs found. Zero-trust gate blocked deployment."
          )
          sign_s = (
            "Signed (Cosign keyless)" if is_main and event == "push" and trusted
            else "Skipped (not main branch)" if not is_main
            else "Blocked (critical CVEs present)"
          )

          repo   = os.environ.get("GITHUB_REPOSITORY", "")
          sha    = os.environ.get("GITHUB_SHA", "unknown")
          branch = os.environ.get("GITHUB_REF_NAME", "")
          actor  = os.environ.get("GITHUB_ACTOR", "")
          run_n  = os.environ.get("GITHUB_RUN_NUMBER", "")
          run_id = os.environ.get("GITHUB_RUN_ID", "")
          server = os.environ.get("GITHUB_SERVER_URL", "https://github.com")

          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
            f.write("# DevGuard - Zero-Trust Pipeline Report\n\n")
            f.write("| Field | Value |\n")
            f.write("|-------|-------|\n")
            f.write(f"| Commit | {sha[:12]} |\n")
            f.write(f"| Branch | {branch} |\n")
            f.write(f"| Author | {actor} |\n")
            f.write(f"| Event  | {event} |\n")
            f.write(f"| Run    | #{run_n} |\n\n")
            f.write(f"## Trust Gate: {trust}\n\n")
            f.write(f"{detail}\n\n")
            f.write("## Security Scan Results\n\n")
            f.write("| Scan | Critical | High | Gate |\n")
            f.write("|------|----------|------|------|\n")
            f.write(f"| Dependency (Trivy) | {dc} | {dh} | {'Pass' if dc == 0 else 'BLOCKED'} |\n")
            f.write(f"| Image (Trivy)      | {ic} | {ih} | {'Pass' if ic == 0 else 'BLOCKED'} |\n")
            f.write(f"| TOTAL              | {tc} | {th} | |\n\n")
            f.write("## Pipeline Stages\n\n")
            f.write("| Stage | Tool | Status |\n")
            f.write("|-------|------|--------|\n")
            f.write("| Lint           | flake8 7.1.1   | Passed |\n")
            f.write("| Tests          | pytest + cov   | Passed |\n")
            f.write(f"| Dep Scan      | Trivy fs       | {'Pass' if dc == 0 else 'BLOCKED'} |\n")
            f.write("| Docker Build   | Buildx         | Built |\n")
            f.write(f"| Image Scan    | Trivy image    | {'Pass' if ic == 0 else 'BLOCKED'} |\n")
            f.write("| SBOM           | Syft SPDX      | Generated |\n")
            f.write(f"| Sign          | Cosign         | {sign_s} |\n")
            f.write("| Summary        | -              | Done |\n\n")
            f.write("## Artifacts\n\n")
            f.write("| Artifact | Retention |\n")
            f.write("|----------|-----------|\n")
            f.write("| coverage-report    | 7 days |\n")
            f.write("| trivy-deps-report  | 14 days |\n")
            f.write("| trivy-image-report | 14 days |\n")
            f.write("| sbom-report        | 90 days |\n\n")
            f.write(f"DevGuard Zero-Trust Pipeline - {sha[:12]} - {branch}\n")

          print("Report written successfully.")
          PYEOF

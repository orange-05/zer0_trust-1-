[pytest]
# pytest.ini — Pytest Configuration
# ====================================
# WHY A pytest.ini?
# - Configures test discovery (where to find tests)
# - Sets default options so you don't type them every time
# - Configures coverage reporting

# Tell pytest where to find tests
testpaths = tests

# Default options for every test run:
# -v: verbose output (show each test name)
# --tb=short: short traceback format (easier to read)
addopts = -v --tb=short

# Markers prevent "unknown mark" warnings
markers =
    auth: Authentication tests
    health: Health check tests
    pipelines: Pipeline CRUD tests
    scans: Security scan tests
    deployments: Deployment tests
    integration: Integration tests spanning multiple modules
